<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title><%= pageTitle %></title>
    <meta name="theme-color" content="#0b1220" />

    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/shared/css/sidebar.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="/static/css/reles/gerenciar_reles.css" />
  
    <script src="/shared/utils/dom-safe.js"></script>
    <script src="/shared/utils/ui-actions.js"></script>
</head>
  <body class="monitoramento-page monitoramento-page--reles-manage">
    <div class="page-container">
      <div id="sidebar-root"></div>

      <main class="main-content">
        <div class="container-fluid monitoramento-shell">
          <header class="main-header">
            <div class="header-content">
              <div>
                <div class="monitoramento-header__badge">
                  <i class="fa-solid fa-satellite-dish"></i>
                  Relés TCP
                </div>
                <h1 class="page-title">
                  <span class="material-icons">settings_applications</span>
                  Gerenciamento de Relés
                </h1>
              </div>
              <div class="header-actions-stack">
                <a href="/monitoramento-hub" class="mon-btn mon-btn--ghost">
                  <span class="material-icons">arrow_back</span>
                  Voltar
                </a>
                <button id="btn-add-rele" class="mon-btn mon-btn--primary">
                  <span class="material-icons">add</span>
                  Adicionar Novo Relé
                </button>
              </div>
            </div>
          </header>

          <div class="toolbar">
            <div class="search-container">
              <span class="material-icons">search</span>
              <input
                type="text"
                id="search-input"
                placeholder="Buscar por nome, tag, IP ou ID..."
              />
            </div>
          </div>

          <div class="monitoramento-panel table-container">
            <table id="reles-table">
              <thead>
                <tr>
                  <th>Nome do Relé</th>
                  <th>Local Tag</th>
                  <th>Endereço IP</th>
                  <th>Porta (Dispositivo)</th>
                  <th>Porta (Servidor)</th>
                  <th>Registration Packet ID</th>
                  <th>Status</th>
                  <th>Ações</th>
                </tr>
              </thead>
              <tbody id="reles-table-body"></tbody>
            </table>
          </div>
        </div>

        <div id="rele-modal" class="modal">
          <div class="modal-content">
            <span class="close-button">&times;</span>
            <h2 id="modal-title">Adicionar Novo Relé</h2>
            <form id="rele-form">
              <input type="hidden" id="rele-id" />
              <div class="form-group">
                <label for="nome_rele">Nome do Relé:</label>
                <input type="text" id="nome_rele" name="nome_rele" required />
              </div>
              <div class="form-group">
                <label for="local_tag">Local Tag (Identificador Único):</label>
                <input type="text" id="local_tag" name="local_tag" />
              </div>
              <div class="form-group">
                <label for="ip_address">Endereço IP (Dispositivo):</label>
                <input type="text" id="ip_address" name="ip_address" required />
              </div>
              <div class="form-group">
                <label for="port">Porta (Dispositivo):</label>
                <input type="number" id="port" name="port" required />
              </div>
              <div class="form-group">
                <label for="listen_port">Porta Dedicada (Servidor):</label>
                <input
                  type="number"
                  id="listen_port"
                  name="listen_port"
                  placeholder="Para dispositivos sem Reg. Packet"
                />
              </div>
              <div class="form-group">
                <label for="custom_id">Registration Packet ID (Hex):</label>
                <input
                  type="text"
                  id="custom_id"
                  name="custom_id"
                  placeholder="Para dispositivos com Reg. Packet"
                />
              </div>
              <div class="form-group-checkbox">
                <input type="checkbox" id="ativo" name="ativo" checked />
                <label for="ativo">Ativo (Monitorar este relé)</label>
              </div>
              <div class="form-actions">
                <button type="submit" class="mon-btn mon-btn--primary">Salvar</button>
                <button type="button" id="btn-cancel" class="mon-btn mon-btn--ghost">
                  Cancelar
                </button>
              </div>
            </form>
          </div>
        </div>

        <script src="/scripts/reles/gerenciar_reles.js"></script>
      </main>
    </div>
    <script src="/shared/scripts/sidebar.js"></script>
  </body>
</html>
