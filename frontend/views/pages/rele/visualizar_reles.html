<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title><%= pageTitle %></title>
    <meta name="theme-color" content="#0b1220" />

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="/shared/css/sidebar.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="/static/css/reles/visualizar_reles.css">

    <script src="/shared/utils/dom-safe.js"></script>
    <script src="/shared/utils/ui-actions.js"></script>
</head>
<body class="monitoramento-page monitoramento-page--reles-live">
    <div class="page-container">
      <div id="sidebar-root"></div>

      <main class="main-content">
        <div class="container-fluid monitoramento-shell">
          <header class="main-header">
            <div class="header-content">
              <div>
                <div class="monitoramento-header__badge">
                  <i class="fa-solid fa-satellite-dish"></i>
                  Relés TCP
                </div>
                <h1 class="page-title">
                  <span class="material-icons">electrical_services</span>
                  Monitoramento de Relés
                </h1>
              </div>
              <div class="header-actions-stack">
                <a href="/monitoramento-hub" class="mon-btn mon-btn--ghost">
                  <span class="material-icons">arrow_back</span>
                  Voltar
                </a>
              </div>
            </div>
          </header>

          <div id="reles-dashboard" class="dashboard-grid">
            <p id="loading-message">Carregando dispositivos...</p>
          </div>
        </div>

        <script src="/scripts/reles/visualizar_reles.js"></script>
      </main>
    </div>
    <script src="/shared/scripts/sidebar.js"></script>
</body>
</html>
