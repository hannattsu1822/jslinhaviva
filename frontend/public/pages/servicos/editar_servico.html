<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Editar Serviço | Linha Viva</title>
    <meta name="theme-color" content="#0b1220" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="/static/css/editar_servico.css" />
    <link rel="stylesheet" href="/shared/css/sidebar.css" />
  
    <script src="/shared/utils/dom-safe.js"></script>
    <script src="/shared/utils/ui-actions.js"></script>
</head>
  <body class="servicos-page servicos-page--editar">
    <div class="page-container">
      <div id="sidebar-root"></div>
      <main class="main-content">
        <div class="container-fluid servicos-shell py-4">
          <header class="main-header page-header-servicos d-flex justify-content-between align-items-start flex-wrap gap-3 mb-4">
            <div>
              <div class="servicos-header__badge">
                <i class="fa-solid fa-screwdriver-wrench"></i>
                Gestão de Serviços
              </div>
              <h1 class="page-title mb-0">
                <i class="fa-solid fa-pen-to-square"></i>
                Editar Serviço
              </h1>
            </div>
            <div class="header-actions-stack">
              <a href="/gestao-servicos" class="btn btn-secondary">
                <i class="fa-solid fa-arrow-left"></i>
                Voltar
              </a>
              <a
                href="/detalhes_servico"
                class="btn btn-outline-secondary"
                id="btn-voltar-detalhes"
              >
                <i class="fa-solid fa-times"></i>
                Cancelar
              </a>
            </div>
          </header>

<div class="form-page-container">
      <div class="form-container-card">
        <form id="editarServicoForm" enctype="multipart/form-data">
          <input type="hidden" id="servicoId" name="servicoId" />

          <div class="row mb-3">
            <div class="col-md-6">
              <label for="processo" class="form-label"
                >Número do Processo *</label
              >
              <input
                type="text"
                class="form-control"
                id="processo"
                name="processo"
                required
              />
              <div class="form-text">
                Para serviços emergenciais, este campo não pode ser alterado.
              </div>
            </div>
            <div class="col-md-6">
              <label for="tipo_processo" class="form-label"
                >Tipo de Processo *</label
              >
              <select
                class="form-select"
                id="tipo_processo"
                name="tipo_processo"
                required
              >
                <option value="Normal">Normal</option>
                <option value="Emergencial">Emergencial</option>
              </select>
            </div>
          </div>

          <div class="row mb-3">
            <div class="col-md-6">
              <label for="origem" class="form-label">Setor de Origem *</label>
              <select class="form-select" id="origem" name="origem" required>
                <option value="Operação">Operação</option>
                <option value="Construção">Construção</option>
              </select>
            </div>
            <div class="col-md-6">
              <label for="data_prevista_execucao" class="form-label"
                >Data Prevista *</label
              >
              <input
                type="date"
                class="form-control"
                id="data_prevista_execucao"
                name="data_prevista_execucao"
                required
              />
            </div>
          </div>

          <div class="row mb-3">
            <div class="col-md-6">
              <label for="subestacao" class="form-label">Subestação *</label>
              <input
                type="text"
                class="form-control"
                id="subestacao"
                name="subestacao"
                required
              />
            </div>
            <div class="col-md-6">
              <label for="alimentador" class="form-label">Alimentador</label>
              <input
                type="text"
                class="form-control"
                id="alimentador"
                name="alimentador"
              />
            </div>
          </div>

          <div class="row mb-3">
            <div class="col-md-6">
              <label for="chaveMontante" class="form-label"
                >Chave Montante</label
              >
              <input
                type="text"
                class="form-control"
                id="chaveMontante"
                name="chave_montante"
              />
            </div>
            <div class="col-md-6">
              <label for="ordem_obra" class="form-label">Ordem de Obra</label>
              <select class="form-select" id="ordem_obra" name="ordem_obra">
                <option value="">Nenhuma</option>
                <option value="ODI">ODI</option>
                <option value="ODD">ODD</option>
                <option value="ODS">ODS</option>
              </select>
            </div>
          </div>

          <div class="row mb-3">
            <div class="col-md-6">
              <label for="desligamento" class="form-label"
                >Desligamento *</label
              >
              <select
                class="form-select"
                id="desligamento"
                name="desligamento"
                required
              >
                <option value="SIM">Sim</option>
                <option value="NÃO">Não</option>
              </select>
            </div>
            <div class="col-md-6" id="horariosContainer" style="display: none">
              <div class="row">
                <div class="col-6">
                  <label for="horaInicio" class="form-label"
                    >Hora de Início *</label
                  >
                  <input
                    type="time"
                    class="form-control"
                    id="horaInicio"
                    name="hora_inicio"
                  />
                </div>
                <div class="col-6">
                  <label for="horaFim" class="form-label"
                    >Hora de Término *</label
                  >
                  <input
                    type="time"
                    class="form-control"
                    id="horaFim"
                    name="hora_fim"
                  />
                </div>
              </div>
            </div>
          </div>

          <div class="row mb-3">
            <div class="col-md-12">
              <label for="maps" class="form-label">Link do Google Maps</label>
              <input
                type="url"
                class="form-control"
                id="maps"
                name="maps"
                placeholder="https://maps.app.goo.gl/exemplo"
              />
            </div>
          </div>

          <div class="row mb-3">
            <div class="col-md-6">
              <label for="descricao_servico" class="form-label"
                >Descrição / Motivo do Serviço</label
              >
              <textarea
                class="form-control"
                id="descricao_servico"
                name="descricao_servico"
                rows="4"
                placeholder="Digite a descrição ou o motivo do serviço..."
              ></textarea>
            </div>
            <div class="col-md-6">
              <label for="observacoes" class="form-label">Observações</label>
              <textarea
                class="form-control"
                id="observacoes"
                name="observacoes"
                rows="4"
                placeholder="Digite observações adicionais, se houver..."
              ></textarea>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Anexos Atuais</label>
            <div id="anexosAtuais" class="attachment-container">
              <p
                id="semAnexos"
                class="text-muted w-100 text-center my-2"
                style="display: none"
              >
                Nenhum anexo atual.
              </p>
            </div>
          </div>

          <div class="mb-3">
            <label for="novosAnexos" class="form-label"
              >Adicionar Novos Anexos (Máx. 5)</label
            >
            <input
              type="file"
              class="form-control"
              id="novosAnexos"
              name="anexos"
              multiple
              accept=".jpg,.jpeg,.png,.pdf,.doc,.docx,.xls,.xlsx"
            />
            <div class="form-text">
              Formatos: JPG, PNG, PDF, DOC(X), XLS(X). Max 10MB por arquivo.
            </div>
            <div id="previewNovosAnexos" class="preview-container mt-2"></div>
          </div>

          <div class="d-flex justify-content-end mt-4 pt-3 border-top">
            <button type="submit" class="btn btn-primary btn-lg" id="btnSalvar">
              <i class="fas fa-save me-2"></i>Salvar Alterações
            </button>
          </div>
        </form>
      </div>
    </div>
        </div>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/scripts/shared/moduloNivel.permissions.js"></script>
    <script src="/scripts/servicos/servicos.permissions.js"></script>
    <script src="/scripts/servicos/editar_servico.js"></script>
    <script src="/shared/scripts/sidebar.js"></script>
  </body>
</html>
