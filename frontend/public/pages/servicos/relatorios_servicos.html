<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Relatórios de Serviços | Linha Viva</title>
    <meta name="theme-color" content="#0b1220" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      rel="stylesheet"
      href="/static/css/servicos/relatorios_servicos.css"
    />
    <link rel="stylesheet" href="/shared/css/sidebar.css" />
  
    <script src="/shared/utils/dom-safe.js"></script>
    <script src="/shared/utils/ui-actions.js"></script>
</head>
  <body class="servicos-page servicos-page--relatorios">
    <div class="page-container">
      <div id="sidebar-root"></div>

      <main class="main-content">
        <div class="container-fluid servicos-shell py-4">
          <header class="main-header page-header-servicos d-flex justify-content-between align-items-start flex-wrap gap-3">
            <div>
              <div class="servicos-header__badge">
                <i class="fa-solid fa-screwdriver-wrench"></i>
                Gestão de Serviços
              </div>
              <h1 class="page-title mb-0">
                <i class="fa-solid fa-chart-line"></i>
                Relatórios de Serviços
              </h1>
            </div>
            <div class="header-actions-stack">
              <a href="/gestao-servicos" class="btn btn-secondary">
                <i class="fa-solid fa-arrow-left"></i>
                Voltar
              </a>
            </div>
          </header>

      <section class="card mb-4 filter-card">
        <div class="card-header">
          <h2 class="h5 mb-0 d-flex align-items-center">
            <span class="material-symbols-outlined me-2">filter_alt</span>
            Filtros
          </h2>
        </div>
        <div class="card-body">
          <div class="row g-3 align-items-end">
            <div class="col-md-3">
              <label for="filtroPeriodoInicio" class="form-label"
                >Período Início:</label
              >
              <input
                type="date"
                class="form-control"
                id="filtroPeriodoInicio"
              />
            </div>
            <div class="col-md-3">
              <label for="filtroPeriodoFim" class="form-label"
                >Período Fim:</label
              >
              <input
                type="date"
                class="form-control"
                id="filtroPeriodoFim"
              />
            </div>
            <div class="col-md-3">
              <label for="filtroEncarregadoRel" class="form-label"
                >Encarregado:</label
              >
              <select class="form-select" id="filtroEncarregadoRel">
                <option value="">Todos</option>
              </select>
            </div>
            <div class="col-md-3">
              <label for="filtroStatusFinal" class="form-label"
                >Status Finalização:</label
              >
              <select class="form-select" id="filtroStatusFinal">
                <option value="finalizado" selected>Todos Finalizados</option>
                <option value="concluido">Apenas Concluídos</option>
                <option value="nao_concluido">Apenas Não Concluídos</option>
              </select>
            </div>
            <div class="col-md-12 text-end">
              <button class="btn btn-primary mt-2" id="btnGerarRelatorios">
                <span class="material-symbols-outlined me-1">refresh</span>
                Aplicar Filtros e Gerar
              </button>
            </div>
          </div>
        </div>
      </section>

      <section class="row">
        <div class="col-lg-6 mb-4">
          <div class="card chart-card">
            <div class="card-header">
              <h3 class="h6 mb-0">Serviços por Encarregado</h3>
            </div>
            <div class="card-body chart-container">
              <canvas id="graficoServicosPorEncarregado"></canvas>
            </div>
          </div>
        </div>
        <div class="col-lg-6 mb-4">
          <div class="card chart-card">
            <div class="card-header">
              <h3 class="h6 mb-0">Serviços por Desligamento</h3>
            </div>
            <div class="card-body chart-container">
              <canvas id="graficoServicosPorDesligamento"></canvas>
            </div>
          </div>
        </div>
      </section>
      <section class="row">
        <div class="col-lg-8 mb-4">
          <div class="card chart-card">
            <div class="card-header">
              <h3 class="h6 mb-0" id="tituloGraficoPorMes">
                Serviços Concluídos por Mês
              </h3>
            </div>
            <div class="card-body chart-container">
              <canvas id="graficoServicosPorMes"></canvas>
            </div>
          </div>
        </div>
        <div class="col-lg-4 mb-4">
          <div class="card chart-card">
            <div class="card-header">
              <h3 class="h6 mb-0">Status de Finalização</h3>
            </div>
            <div class="card-body chart-container">
              <canvas id="graficoStatusFinalizacao"></canvas>
            </div>
          </div>
        </div>
      </section>

      <footer class="text-center text-muted py-3 mt-2 border-top">
        <small
          >© <span id="anoAtual"></span> Sistema Integrado Linha VIVA. Todos os
          direitos reservados.</small
        >
      </footer>
        </div>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/scripts/shared/moduloNivel.permissions.js"></script>
    <script src="/scripts/servicos/servicos.permissions.js"></script>
    <script src="/scripts/servicos/relatorios_servicos.js"></script>
    <script src="/shared/scripts/sidebar.js"></script>
  </body>
</html>
