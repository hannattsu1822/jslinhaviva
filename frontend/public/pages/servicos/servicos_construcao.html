<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acompanhamento Construção | Linha Viva</title>
    <meta name="theme-color" content="#0b1220" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/css/servicos_construcao.css" />
    <link rel="stylesheet" href="/shared/css/sidebar.css" />
    <link rel="stylesheet" href="/static/css/toast.css" />
  
    <script src="/shared/utils/dom-safe.js"></script>
    <script src="/shared/utils/ui-actions.js"></script>
</head>

  <body class="servicos-page servicos-page--construcao">
    <div class="page-container">
      <div id="sidebar-root"></div>

      <main class="main-content">
        <div class="container-fluid servicos-shell py-4">
          <header class="main-header page-header-servicos d-flex justify-content-between align-items-start flex-wrap gap-3">
            <div>
              <div class="servicos-header__badge">
                <i class="fa-solid fa-screwdriver-wrench"></i>
                Construção
              </div>
              <h1 class="page-title mb-0">
                <i class="fa-solid fa-hard-hat"></i>
                Acompanhamento de Construção
              </h1>
              <p class="page-subtitle">
                Consulte, filtre e acompanhe os serviços de construção.
              </p>
            </div>
            <div class="header-actions-stack">
              <button class="btn btn-outline-primary" id="btn-atualizar">
                <i class="fa-solid fa-sync-alt"></i>
                Atualizar
              </button>
            </div>
          </header>

        <ul class="nav nav-tabs mb-3" id="abas-construcao" role="tablist">
          <li class="nav-item" role="presentation">
            <button class="nav-link active" id="tab-ativos" data-aba="ativos" type="button" role="tab">
              Serviços Ativos
            </button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link" id="tab-historico" data-aba="historico" type="button" role="tab">
              Histórico / Concluídos
            </button>
          </li>
        </ul>

        <div class="card glass-card mb-4">
          <div class="card-body">
            <div class="filters-title">
              <i class="fas fa-filter"></i>Filtros de busca
            </div>

            <div class="row g-3 align-items-end">
              <div class="col-lg-3 col-md-6">
                <label for="filtro-processo" class="form-label">Filtrar por ID ou Processo</label>
                <input type="text" class="form-control" id="filtro-processo" placeholder="Digite para buscar..." />
              </div>

              <div class="col-lg-3 col-md-6" id="filtro-status-wrapper">
                <label for="filtro-status" class="form-label">Filtrar por Status</label>
                <select class="form-select" id="filtro-status">
                  <option value="">Todos</option>
                  <option value="andamento">Em Andamento</option>
                  <option value="concluido">Concluído</option>
                  <option value="nao_concluido">Não Concluído</option>
                </select>
              </div>

              <div class="col-lg-6 col-md-12 periodo-wrapper" id="filtro-periodo-wrapper">
                <label class="form-label">Período de Término</label>
                <div class="periodo-range">
                  <div class="periodo-campo">
                    <span class="periodo-label">De</span>
                    <input type="date" class="form-control" id="filtro-data-inicio" aria-label="Data inicial" />
                  </div>
                  <div class="periodo-campo">
                    <span class="periodo-label">Até</span>
                    <input type="date" class="form-control" id="filtro-data-fim" aria-label="Data final" />
                  </div>
                </div>
              </div>

              <div class="col-lg-3 col-md-6">
                <label for="filtro-equipe" class="form-label">Equipe</label>
                <select class="form-select" id="filtro-equipe">
                  <option value="">Todas</option>
                </select>
              </div>

              <div class="col-lg-3 col-md-6">
                <label for="filtro-desligamento" class="form-label">Desligamento</label>
                <select class="form-select" id="filtro-desligamento">
                  <option value="">Todos</option>
                  <option value="SIM">Com desligamento</option>
                  <option value="NAO">Sem desligamento</option>
                </select>
              </div>

              <div class="col-lg-3 col-md-6">
                <label for="ordenar-por" class="form-label">Ordenar por</label>
                <select class="form-select" id="ordenar-por">
                  <option value="data_desc">Data (Mais recente)</option>
                  <option value="data_asc">Data (Mais antiga)</option>
                  <option value="id_desc">ID (Mais recente)</option>
                  <option value="id_asc">ID (Mais antigo)</option>
                </select>
              </div>
            </div>
          </div>
        </div>

        <div class="card glass-card">
          <div class="card-body">
            <div class="table-header">
              <h5 class="table-title" id="titulo-lista">Serviços Ativos</h5>
              <span class="badge bg-primary" id="contador-servicos">0 serviços</span>
            </div>

            <div class="table-responsive">
              <table class="table table-hover align-middle servicos-data-table">
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>Processo</th>
                    <th>Equipe</th>
                    <th>Alimentador</th>
                    <th>Desligamento</th>
                    <th>Data Criação</th>
                    <th>Data Prevista</th>
                    <th>Data Término</th>
                    <th>Status / Motivo</th>
                    <th class="text-center">Ações</th>
                  </tr>
                </thead>
                <tbody id="tabela-servicos-construcao">
                  <tr>
                    <td colspan="10" class="text-center py-5">Carregando serviços...</td>
                  </tr>
                </tbody>
              </table>
            </div>

            <div class="pagination-controls">
              <div class="pagination-info">
                <span id="info-paginacao">Página 1 de 1</span>
              </div>
              <div class="pagination-buttons">
                <button class="btn btn-sm btn-outline-primary" id="btn-primeira-pagina"><i class="fas fa-angle-double-left"></i></button>
                <button class="btn btn-sm btn-outline-primary" id="btn-pagina-anterior"><i class="fas fa-angle-left"></i> Anterior</button>
                <button class="btn btn-sm btn-outline-primary" id="btn-proxima-pagina">Próxima <i class="fas fa-angle-right"></i></button>
                <button class="btn btn-sm btn-outline-primary" id="btn-ultima-pagina"><i class="fas fa-angle-double-right"></i></button>
              </div>
            </div>
          </div>
        </div>
        </div>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/shared/scripts/sidebar.js"></script>
    <script src="/scripts/shared/moduloNivel.permissions.js"></script>
    <script src="/scripts/construcao/construcao.permissions.js"></script>
    <script src="/scripts/servicos/servicos_construcao.js"></script>
  </body>
</html>
