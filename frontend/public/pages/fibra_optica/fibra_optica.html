<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fibra Óptica | Linha Viva</title>
    <meta name="theme-color" content="#0b1220" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="/static/css/fibra_optica_principal.css" />
    <link rel="stylesheet" href="/shared/css/sidebar.css" />
    <link rel="stylesheet" href="/static/css/toast.css" />
  </head>

  <body class="fibra-page fibra-page--hub">
    <div class="page-container">
      <div id="sidebar-root"></div>

      <main class="main-content">
        <div class="container-fluid fibra-shell py-4">
          <header class="main-header">
            <div class="header-content">
              <div>
                <div class="fibra-header__badge">
                  <i class="fa-solid fa-network-wired"></i>
                  Operações
                </div>
                <h1 class="page-title">
                  <i class="fa-solid fa-network-wired"></i>
                  Gestão de Fibra Óptica
                </h1>
              </div>
            </div>
          </header>

          <div class="row g-4">
            <div class="col-md-6 col-lg-4">
              <div
                class="card fibra-module-card h-100"
                onclick="navigateTo('registro_projeto_fibra')"
                role="button"
                tabindex="0"
              >
                <div class="card-body">
                  <div class="fibra-module-icon fibra-module-icon--cadastro">
                    <i class="fa-solid fa-file-signature"></i>
                  </div>
                  <h3 class="card-title">Cadastrar Projeto</h3>
                  <p class="card-text">Registre novos projetos de fibra</p>
                </div>
              </div>
            </div>

            <div class="col-md-6 col-lg-4">
              <div
                class="card fibra-module-card h-100"
                onclick="navigateTo('projetos_fibra_andamento')"
                role="button"
                tabindex="0"
              >
                <div class="card-body">
                  <div class="fibra-module-icon fibra-module-icon--andamento">
                    <i class="fa-solid fa-list-check"></i>
                  </div>
                  <h3 class="card-title">Projetos em Andamento</h3>
                  <p class="card-text">Acompanhe os projetos ativos</p>
                </div>
              </div>
            </div>

            <div class="col-md-6 col-lg-4">
              <div
                class="card fibra-module-card h-100"
                onclick="navigateTo('projetos_fibra_concluidos')"
                role="button"
                tabindex="0"
              >
                <div class="card-body">
                  <div class="fibra-module-icon fibra-module-icon--concluidos">
                    <i class="fa-solid fa-check-double"></i>
                  </div>
                  <h3 class="card-title">Projetos Concluídos</h3>
                  <p class="card-text">Visualize o histórico de projetos</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <div id="access-denied-modal" class="modal fade" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-body text-center p-4">
            <i class="fa-solid fa-circle-exclamation text-danger mb-3 fs-1"></i>
            <h4 class="mb-3">Acesso negado!</h4>
            <p>Você não tem permissão para acessar este recurso.</p>
            <button type="button" class="btn btn-primary" data-bs-dismiss="modal">
              Entendi
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/shared/scripts/sidebar.js"></script>
    <script>
      function navigateTo(pageKey) {
        const pageUrls = {
          registro_projeto_fibra: "/registro_projeto_fibra",
          projetos_fibra_andamento: "/projetos_fibra_andamento",
          projetos_fibra_concluidos: "/projetos_fibra_concluidos",
        };
        const url = pageUrls[pageKey];
        if (url) window.location.href = url;
      }
    </script>
  </body>
</html>
