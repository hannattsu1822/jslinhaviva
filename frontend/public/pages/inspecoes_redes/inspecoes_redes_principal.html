<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inspeções de Redes | Linha Viva</title>
    <meta name="theme-color" content="#0b1220" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="/static/css/inspecoes_redes_principal.css" />
    <link rel="stylesheet" href="/shared/css/sidebar.css" />
    <link rel="stylesheet" href="/static/css/toast.css" />
  
    <script src="/shared/utils/dom-safe.js"></script>
    <script src="/shared/utils/ui-actions.js"></script>
</head>

  <body class="redes-page redes-page--hub">
    <div class="page-container">
      <div id="sidebar-root"></div>

      <main class="main-content">
        <div class="container-fluid redes-shell py-4">
          <header class="main-header">
            <div class="header-content">
              <div>
                <div class="redes-header__badge">
                  <i class="fa-solid fa-map-location-dot"></i>
                  Redes
                </div>
                <h1 class="page-title">
                  <i class="fa-solid fa-map-location-dot"></i>
                  Inspeções de Redes
                </h1>
              </div>
            </div>
          </header>

          <div class="row g-4">
            <div class="col-md-6 col-lg-4">
              <div data-action="navigateTo" data-target="registro_inspecao_rede"
                class="card redes-module-card h-100"
               
                role="button"
                tabindex="0"
              >
                <div class="card-body">
                  <div class="redes-module-icon redes-module-icon--registrar">
                    <i class="fa-solid fa-clipboard-list"></i>
                  </div>
                  <h3 class="card-title">Registrar Inspeção</h3>
                  <p class="card-text">Cadastre novas inspeções de rede</p>
                </div>
              </div>
            </div>

            <div class="col-md-6 col-lg-4">
              <div data-action="navigateTo" data-target="inspecoes_rede_andamento"
                class="card redes-module-card h-100"
               
                role="button"
                tabindex="0"
              >
                <div class="card-body">
                  <div class="redes-module-icon redes-module-icon--agendadas">
                    <i class="fa-solid fa-route"></i>
                  </div>
                  <h3 class="card-title">Inspeções Agendadas</h3>
                  <p class="card-text">Acompanhe inspeções em campo</p>
                </div>
              </div>
            </div>

            <div class="col-md-6 col-lg-4">
              <div data-action="navigateTo" data-target="relatorios_inspecao_rede"
                class="card redes-module-card h-100"
               
                role="button"
                tabindex="0"
              >
                <div class="card-body">
                  <div class="redes-module-icon redes-module-icon--relatorios">
                    <i class="fa-solid fa-file-lines"></i>
                  </div>
                  <h3 class="card-title">Relatórios de Inspeção</h3>
                  <p class="card-text">Visualize relatórios e históricos</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <div id="access-denied-modal" class="modal fade" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-body text-center p-4">
            <i class="fa-solid fa-circle-exclamation text-danger mb-3 fs-1"></i>
            <h4 class="mb-3">Acesso negado!</h4>
            <p>Você não tem permissão para acessar este recurso.</p>
            <button type="button" class="btn btn-primary" data-bs-dismiss="modal">
              Entendi
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/shared/scripts/sidebar.js"></script>
    <script>
      function navigateTo(pageKey) {
        if (pageKey) window.location.href = `/${pageKey}`;
      }
    </script>
  </body>
</html>
