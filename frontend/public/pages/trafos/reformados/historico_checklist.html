<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Histórico de Checklists | Linha Viva</title>
    <meta name="theme-color" content="#0b1220" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="/static/css/trafos_reformados_filtrar.css" />
    <link rel="stylesheet" href="/static/css/transformadores.css" />
    <link rel="stylesheet" href="/shared/css/sidebar.css" />
    <style>
      .history-list-col {
        max-width: 960px;
        margin: 0 auto;
      }
    </style>
  
    <script src="/shared/utils/dom-safe.js"></script>
    <script src="/shared/utils/ui-actions.js"></script>
</head>
  <body class="trafos-page trafos-page--historico">
    <div class="page-container">
      <div id="sidebar-root"></div>

      <main class="main-content">
        <div class="container-fluid trafos-shell py-4">
          <header class="main-header page-header-trafos d-flex justify-content-between align-items-start flex-wrap gap-3 mb-4">
            <div>
              <div class="trafos-header__badge">
                <i class="fa-solid fa-rotate"></i>
                Reformados
              </div>
              <h1 class="page-title mb-0">
                <i class="fa-solid fa-clock-rotate-left"></i>
                Histórico do Trafo:
                <span id="trafoNumeroSerie">Carregando...</span>
              </h1>
            </div>
            <div class="header-actions-stack">
              <a href="/consultar_historicos.html" class="btn btn-secondary">
                <i class="fa-solid fa-arrow-left"></i>
                Voltar
              </a>
            </div>
          </header>

          <div class="history-list-col">
            <div class="card results-card-trafos">
              <div
                class="card-header d-flex justify-content-between align-items-center"
              >
                <span class="card-title mb-0">Avaliações Registradas</span>
                <button class="btn btn-success btn-sm" id="btnGerarPDFLista">
                  <i class="fa-solid fa-file-pdf me-2"></i>Gerar PDF da Lista
                </button>
              </div>
              <div
                id="checklistHistoryList"
                class="list-group list-group-flush"
              ></div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/shared/scripts/sidebar.js"></script>
    <script src="/scripts/trafos_reformados/historico_checklist.js"></script>
  </body>
</html>
