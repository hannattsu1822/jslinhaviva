<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Consultar Checklists | Linha Viva</title>
    <meta name="theme-color" content="#0b1220" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="/static/css/trafos_reformados_filtrar.css" />
    <link rel="stylesheet" href="/static/css/transformadores.css" />
    <link rel="stylesheet" href="/shared/css/sidebar.css" />
    <link rel="stylesheet" href="/static/css/toast.css" />
  
    <script src="/shared/utils/dom-safe.js"></script>
    <script src="/shared/utils/ui-actions.js"></script>
</head>

  <body class="trafos-page trafos-page--consultar-historicos">
    <div class="page-container">
      <div id="sidebar-root"></div>

      <main class="main-content">
        <div class="container-fluid trafos-shell py-4">
          <header class="main-header page-header-trafos d-flex justify-content-between align-items-start flex-wrap gap-3 mb-4">
            <div>
              <div class="trafos-header__badge">
                <i class="fa-solid fa-rotate"></i>
                Reformados
              </div>
              <h1 class="page-title mb-0">
                <i class="fa-solid fa-magnifying-glass"></i>
                Consultar Checklists Avaliados
              </h1>
            </div>
            <div class="header-actions-stack">
              <a href="/transformadores_reformados" class="btn btn-secondary">
                <i class="fa-solid fa-arrow-left"></i>
                Voltar
              </a>
            </div>
          </header>

        <div class="card filter-card-trafos p-4 mb-4">
          <h3 class="mb-3 card-title section-card-title">
            <i class="fa-solid fa-filter me-2"></i>Filtrar Checklists
          </h3>
          <form id="filtroFormHistorico">
            <div class="row g-3">
              <div class="col-md-3">
                <label for="filterId" class="form-label">ID do Registro</label>
                <input
                  type="number"
                  class="form-control"
                  id="filterId"
                  placeholder="Digite o ID"
                />
              </div>
              <div class="col-md-3">
                <label for="filterNumeroSerie" class="form-label"
                  >Número de Série</label
                >
                <input
                  type="text"
                  class="form-control"
                  id="filterNumeroSerie"
                  placeholder="Digite o Nº de Série"
                />
              </div>
              <div class="col-md-3">
                <label for="filterStatus" class="form-label">Status</label>
                <select class="form-select" id="filterStatus">
                  <option value="">Todos (Avaliados)</option>
                  <option value="avaliado">Aprovados</option>
                  <option value="reprovado">Reprovados</option>
                </select>
              </div>
              <div class="col-md-3">
                <label for="filterPotencia" class="form-label"
                  >Potência (kVA)</label
                >
                <select class="form-select" id="filterPotencia">
                  <option value="">Todas</option>
                </select>
              </div>
              <div class="col-md-4">
                <label for="filterTecnico" class="form-label"
                  >Técnico Responsável</label
                >
                <select class="form-select" id="filterTecnico">
                  <option value="">Todos</option>
                </select>
              </div>
              <div class="col-md-4">
                <label for="filterDataAvaliacaoInicial" class="form-label"
                  >Data Aval. Inicial</label
                >
                <input
                  type="date"
                  class="form-control"
                  id="filterDataAvaliacaoInicial"
                />
              </div>
              <div class="col-md-4">
                <label for="filterDataAvaliacaoFinal" class="form-label"
                  >Data Aval. Final</label
                >
                <input
                  type="date"
                  class="form-control"
                  id="filterDataAvaliacaoFinal"
                />
              </div>
              <div class="col-12 d-flex justify-content-end">
                <button type="submit" class="btn btn-primary mt-2">
                  <i class="fas fa-search me-2"></i>Buscar
                </button>
              </div>
            </div>
          </form>
        </div>

        <div class="card results-card-trafos">
          <div
            class="card-header d-flex justify-content-between align-items-center"
          >
            <h3 class="mb-0 card-title" style="font-size: 1.2rem">
              <i class="fas fa-table me-2"></i>Resultados da Busca
            </h3>
            <button class="btn btn-success btn-sm" id="btnGerarPDFTabela">
              <i class="fas fa-file-pdf me-2"></i>Gerar PDF da Lista
            </button>
          </div>
          <div class="card-body p-0">
            <div class="table-responsive">
              <table
                class="table table-hover align-middle mb-0"
                id="tabelaResultados"
              >
                <thead>
                  <tr>
                    <th>ID do Registro</th>
                    <th>Nº de Série</th>
                    <th>Fabricante</th>
                    <th>Potência</th>
                    <th>Status</th>
                    <th>Data Avaliação</th>
                    <th>Histórico</th>
                    <th class="text-center">Ações</th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td colspan="8" class="text-center p-5">
                      Utilize os filtros para buscar os checklists.
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
          <div class="card-footer text-muted">
            <div
              class="d-flex justify-content-between align-items-center flex-wrap gap-2"
            >
              <span id="paginationInfo">Mostrando 0 itens</span>
              <div id="paginationControlsContainer" class="no-print"></div>
            </div>
          </div>
        </div>
        </div>
      </main>
    </div>
<div
      class="modal fade"
      id="visualizarChecklistModal"
      tabindex="-1"
      aria-labelledby="visualizarChecklistModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="visualizarChecklistModalLabel">
              Detalhes do Checklist
            </h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body" id="checklistDetailsContainer"></div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Fechar
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/shared/scripts/sidebar.js"></script>
    <script src="/scripts/trafos_reformados/consultar_historicos.js"></script>
  </body>
</html>
