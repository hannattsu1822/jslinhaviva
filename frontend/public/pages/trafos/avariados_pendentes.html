<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Avariados Pendentes | Linha Viva</title>
    <meta name="theme-color" content="#0b1220" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="/static/css/trafos_reformados_filtrar.css" />
    <link rel="stylesheet" href="/static/css/transformadores.css" />
    <link rel="stylesheet" href="/shared/css/sidebar.css" />

    <script src="/shared/utils/dom-safe.js"></script>
    <script src="/shared/utils/ui-actions.js"></script>
  </head>
  <body class="trafos-page trafos-page--reformados-filtrar">
    <div class="page-container">
      <div id="sidebar-root"></div>

      <main class="main-content">
        <div class="container-fluid trafos-shell py-4">
          <header
            class="main-header page-header-trafos d-flex justify-content-between align-items-start flex-wrap gap-3 mb-4"
          >
            <div>
              <div class="trafos-header__badge">
                <i class="fa-solid fa-bolt"></i>
                Avariados
              </div>
              <h1 class="page-title mb-0">
                <i class="fa-solid fa-clipboard-check"></i>
                Avaliação de Avariados Pendentes
              </h1>
            </div>
            <div class="header-actions-stack">
              <a href="/transformadores" class="btn btn-secondary">
                <i class="fa-solid fa-arrow-left"></i>
                Voltar
              </a>
            </div>
          </header>

          <div class="card filter-card-trafos p-4 mb-4">
            <h3 class="mb-3 card-title section-card-title">
              <i class="fa-solid fa-filter me-2"></i>Filtrar Pendentes
            </h3>
            <form id="filtroForm">
              <div class="row g-3">
                <div class="col-md-6">
                  <label for="filterNumeroSerie" class="form-label"
                    >Número de Série</label
                  >
                  <input
                    type="text"
                    class="form-control"
                    id="filterNumeroSerie"
                    placeholder="Digite o Nº de Série"
                  />
                </div>
                <div class="col-md-6 d-flex align-items-end">
                  <button type="submit" class="btn btn-primary w-100">
                    <i class="fas fa-filter me-2"></i>Filtrar
                  </button>
                </div>
              </div>
            </form>
          </div>

          <div class="card results-card-trafos">
            <div
              class="card-header d-flex justify-content-between align-items-center"
            >
              <h3 class="mb-0 card-title" style="font-size: 1.2rem">
                <i class="fas fa-table me-2"></i>Resultados
              </h3>
            </div>
            <div class="card-body p-0">
              <div class="table-responsive">
                <table
                  class="table table-hover align-middle mb-0"
                  id="tabelaResultados"
                >
                  <thead>
                    <tr>
                      <th>Nº de Série</th>
                      <th>Marca</th>
                      <th>Potência</th>
                      <th>Local / Regional</th>
                      <th>Data Remessa</th>
                      <th>Status</th>
                      <th class="text-center">Ações</th>
                    </tr>
                  </thead>
                  <tbody></tbody>
                </table>
              </div>
            </div>
            <div class="card-footer text-muted">
              <div
                class="d-flex justify-content-between align-items-center flex-wrap gap-2"
              >
                <span id="paginationInfo">Mostrando 0 itens</span>
                <div id="paginationControlsContainer" class="no-print"></div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/shared/scripts/sidebar.js"></script>
    <script src="/scripts/trafos/avariados_pendentes.js"></script>
  </body>
</html>
