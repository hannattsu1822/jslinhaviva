<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Editar Inspeção | Linha Viva</title>
    <meta name="theme-color" content="#0b1220" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="/static/css/checklist.css" />
    <link rel="stylesheet" href="/shared/css/sidebar.css" />
  
    <script src="/shared/utils/dom-safe.js"></script>
    <script src="/shared/utils/ui-actions.js"></script>
</head>
  <body class="frota-page frota-page--checklist">
    <div class="page-container">
      <div id="sidebar-root"></div>
      <main class="main-content">
        <div class="container-fluid frota-shell py-4">
          <header class="main-header page-header-frota d-flex justify-content-between align-items-start flex-wrap gap-3 mb-4">
            <div>
              <div class="frota-header__badge">
                <i class="fa-solid fa-truck-front"></i>
                Frota de Veículos
              </div>
              <h1 class="page-title mb-0">
                <i class="fa-solid fa-pen-to-square"></i>
                Editar Inspeção
              </h1>
            </div>
            <div class="header-actions-stack">
              <a href="/filtrar_veiculos" class="btn btn-secondary">
                <i class="fa-solid fa-arrow-left"></i>
                Voltar
              </a>
            </div>
          </header>

<div class="checklist-container">
      <form id="editarForm" class="checklist-form">
        <div class="form-group">
          <label for="matricula">Matrícula:</label>
          <select id="matricula" name="matricula" required>
            <option value="">Selecione uma matrícula</option>
          </select>
        </div>

        <div class="form-group">
          <label for="placa">Placa do Veículo:</label>
          <select id="placa" name="placa" required>
            <option value="">Selecione uma placa</option>
          </select>
        </div>

        <div class="form-group">
          <label for="data_inspecao">Data da Inspeção:</label>
          <input type="date" id="data_inspecao" name="data_inspecao" required />
        </div>
        <div class="form-group">
          <label for="km_atual">KM Atual:</label>
          <input type="number" id="km_atual" name="km_atual" required />
        </div>
        <div class="form-group">
          <label for="horimetro">Horímetro:</label>
          <input type="number" id="horimetro" name="horimetro" required />
        </div>

        <div id="checklist-items" class="checklist-items">
          <p class="text-center">Carregando itens do checklist...</p>
        </div>

        <div class="form-group">
          <label for="observacoes">Observações:</label>
          <textarea id="observacoes" name="observacoes" rows="4"></textarea>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary" id="salvarButton">
            Salvar Alterações
          </button>
        </div>
      </form>

      <div id="mensagem"></div>
    </div>
        </div>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/scripts/frota/editar_inspecao.js"></script>
    <script src="/shared/scripts/sidebar.js"></script>
  </body>
</html>
