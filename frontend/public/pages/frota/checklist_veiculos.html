<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checklist de Veículos | Linha Viva</title>
    <meta name="theme-color" content="#0b1220" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="/static/css/frota/checklist.css" />
    <link rel="stylesheet" href="/shared/css/sidebar.css" />
  </head>
  <body class="frota-page frota-page--checklist">
    <div class="page-container">
      <div id="sidebar-root"></div>
      <main class="main-content">
        <div class="container-fluid frota-shell py-4">
          <header class="main-header page-header-frota d-flex justify-content-between align-items-start flex-wrap gap-3 mb-4">
            <div>
              <div class="frota-header__badge">
                <i class="fa-solid fa-truck-front"></i>
                Frota de Veículos
              </div>
              <h1 class="page-title mb-0">
                <i class="fa-solid fa-clipboard-check"></i>
                Checklist de Veículos
              </h1>
            </div>
            <div class="header-actions-stack">
              <a href="/frota" class="btn btn-secondary">
                <i class="fa-solid fa-arrow-left"></i>
                Voltar
              </a>
            </div>
          </header>

<div class="checklist-container">
      <p class="subtitle text-muted mb-4">Preencha todos os campos obrigatórios</p>

      <form id="checklistForm" class="checklist-form">
        <!-- Campo oculto para o ID do agendamento -->
        <input
          type="hidden"
          id="agendamentoId"
          name="agendamento_id"
          value=""
        />

        <div class="form-section">
          <h2><i class="fas fa-car"></i> Dados do Veículo e Agendamento</h2>
          <div class="form-row">
            <div class="form-group">
              <label for="placa">Placa</label>
              <select id="placa" name="placa" required>
                <option value="">Selecione a placa</option>
              </select>
            </div>
            <div class="form-group">
              <label for="data_inspecao">Data</label>
              <input
                type="date"
                id="data_inspecao"
                name="data_inspecao"
                required
              />
            </div>
          </div>
          <!-- NOVO DROPDOWN PARA AGENDAMENTOS EM ABERTO -->
          <div class="form-row">
            <div class="form-group full-width">
              <label for="agendamentoAberto">Agendamento em Aberto:</label>
              <select id="agendamentoAberto" name="agendamentoAberto">
                <option value="">
                  Selecione um agendamento ou preencha manualmente
                </option>
              </select>
              <p id="agendamentoMessage" class="agendamento-message"></p>
            </div>
          </div>
        </div>

        <div class="form-section">
          <h2><i class="fas fa-user"></i> Dados do Motorista</h2>
          <div class="form-row">
            <div class="form-group">
              <label for="matricula">Matrícula</label>
              <select id="matricula" name="matricula" required>
                <option value="">Selecione a matrícula</option>
              </select>
            </div>
          </div>
        </div>

        <div class="form-section">
          <h2><i class="fas fa-tachometer-alt"></i> KM e Horímetro</h2>
          <div class="form-row">
            <div class="form-group">
              <label for="km_atual">KM Atual</label>
              <input
                type="number"
                id="km_atual"
                name="km_atual"
                required
                min="0"
              />
            </div>
            <div class="form-group">
              <label for="horimetro">Horímetro</label>
              <input
                type="number"
                id="horimetro"
                name="horimetro"
                required
                min="0"
              />
            </div>
          </div>
        </div>

        <div class="form-section">
          <h2><i class="fas fa-tasks"></i> Itens de Verificação</h2>
          <div id="checklist-items" class="checklist-items">
            <p class="text-center">Carregando itens...</p>
          </div>
        </div>

        <div class="form-section">
          <h2><i class="fas fa-comment"></i> Observações</h2>
          <div class="form-group full-width">
            <textarea
              id="observacoes"
              name="observacoes"
              rows="4"
              placeholder="Adicione observações relevantes..."
            ></textarea>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary">
            <i class="fas fa-save"></i> Salvar Inspeção
          </button>
          <button
            type="button"
            class="btn btn-secondary"
            onclick="window.location.href='/frota'"
          >
            <i class="fa-solid fa-arrow-left"></i>
            Cancelar
          </button>
        </div>
      </form>

      <div id="mensagem" class="mensagem"></div>
    </div>
        </div>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/scripts/frota/checklist_veiculos.js"></script>
    <script src="/shared/scripts/sidebar.js"></script>
  </body>
</html>
