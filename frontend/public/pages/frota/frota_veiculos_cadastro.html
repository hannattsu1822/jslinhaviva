<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestão de Veículos | Linha Viva</title>
    <meta name="theme-color" content="#0b1220" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="/static/css/frota_styles.css" />
    <link rel="stylesheet" href="/shared/css/sidebar.css" />
  </head>
  <body class="frota-page frota-page--cadastro">
    <div class="page-container">
      <div id="sidebar-root"></div>
      <main class="main-content">
        <div class="container-fluid frota-shell py-4">
          <header class="main-header page-header-frota d-flex justify-content-between align-items-start flex-wrap gap-3 mb-4">
            <div>
              <div class="frota-header__badge">
                <i class="fa-solid fa-truck-front"></i>
                Controle da Frota
              </div>
              <h1 class="page-title mb-0">
                <i class="fa-solid fa-car"></i>
                Gestão de Veículos
              </h1>
              <p class="page-subtitle mb-0 mt-2">
                Filtre, consulte e gerencie os veículos da frota.
              </p>
            </div>
            <div class="header-actions-stack">
              <a href="/frota_controle" class="btn btn-secondary">
                <i class="fa-solid fa-arrow-left"></i>
                Voltar
              </a>
            </div>
          </header>

      <div class="form-toggle-button">
        <button class="btn btn-primary" id="toggleFormBtn">
          Cadastrar Novo Veículo
        </button>
      </div>

      <div id="formContainer" class="form-container hidden">
        <section class="card-section">
          <div class="card-header">Dados do Novo Veículo</div>
          <div class="card-content">
            <form id="vehicleForm">
              <div class="form-grid form-grid-3-col">
                <div class="form-group">
                  <label for="placa">Placa *</label>
                  <input type="text" id="placa" required maxlength="10" />
                </div>
                <div class="form-group">
                  <label for="nome">Nome/Modelo *</label>
                  <input type="text" id="nome" required maxlength="255" />
                </div>
                <div class="form-group">
                  <label for="codigo">Código (Opcional)</label>
                  <input type="text" id="codigo" maxlength="50" />
                </div>
                <div class="form-group">
                  <label for="tipo_veiculo">Tipo de Veículo *</label>
                  <select id="tipo_veiculo" required>
                    <option value="" selected disabled>Selecione...</option>
                    <option value="Carro">Carro</option>
                    <option value="Caminhonete">Caminhonete</option>
                    <option value="Caminhão">Caminhão</option>
                    <option value="Máquina">Máquina</option>
                    <option value="Outro">Outro</option>
                  </select>
                </div>
                <div class="form-group">
                  <label for="situacao">Situação *</label>
                  <select id="situacao" required>
                    <option value="Ativo" selected>Ativo</option>
                    <option value="Inativo">Inativo</option>
                    <option value="Manutenção">Manutenção</option>
                  </select>
                </div>
                <div class="form-group">
                  <label for="ano_fabricacao">Ano de Fabricação</label>
                  <input type="text" id="ano_fabricacao" maxlength="10" />
                </div>
                <div class="form-group">
                  <label for="cor">Cor</label>
                  <input type="text" id="cor" maxlength="30" />
                </div>
              </div>
              <div class="form-grid" style="margin-top: 1.5rem">
                <div class="form-group">
                  <label for="descricao">Descrição</label>
                  <textarea id="descricao" rows="3"></textarea>
                </div>
              </div>
              <div class="form-actions">
                <button type="submit" class="btn btn-success">
                  Salvar Veículo
                </button>
                <button
                  type="button"
                  id="closeFormBtn"
                  class="btn btn-secondary"
                >
                  Fechar
                </button>
              </div>
            </form>
          </div>
        </section>
      </div>

      <section class="card-section">
        <div class="card-header">Filtros de Pesquisa</div>
        <div class="card-content">
          <form class="form-grid form-grid-3-col">
            <div class="form-group">
              <label for="filterId">ID</label>
              <input
                type="text"
                id="filterId"
                placeholder="Filtrar por ID..."
              />
            </div>
            <div class="form-group">
              <label for="filterCodigo">Código</label>
              <input
                type="text"
                id="filterCodigo"
                placeholder="Filtrar por Código..."
              />
            </div>
            <div class="form-group">
              <label for="filterPlaca">Placa</label>
              <input
                type="text"
                id="filterPlaca"
                placeholder="Filtrar por Placa..."
              />
            </div>
            <div class="form-group">
              <label for="filterNome">Nome/Modelo</label>
              <input
                type="text"
                id="filterNome"
                placeholder="Filtrar por Nome..."
              />
            </div>
          </form>
        </div>
      </section>

      <section class="card-section">
        <div class="card-header">Veículos Cadastrados</div>
        <div class="card-content">
          <div class="table-wrapper">
            <table class="data-table">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Código</th>
                  <th>Placa</th>
                  <th>Nome/Modelo</th>
                  <th>Ações</th>
                </tr>
              </thead>
              <tbody id="vehicleTableBody"></tbody>
            </table>
          </div>
        </div>
      </section>
        </div>
      </main>
    </div>

    <div id="toastContainer" class="toast-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/scripts/frota/frota_veiculos_cadastro.js"></script>
    <script src="/shared/scripts/sidebar.js"></script>
  </body>
</html>
