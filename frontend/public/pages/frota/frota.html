<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Frota</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/css/frota.css" />
    <link rel="stylesheet" href="/shared/css/sidebar.css" />
    <link rel="stylesheet" href="/static/css/toast.css" />
  </head>

  <body>
    <div id="sidebar-root"></div>

    <div class="main-content">
      <div class="container py-4">
        <h1 class="page-title-frota mb-4">
          <i class="fas fa-truck me-3"></i>Frota de Veículos
        </h1>

        <div class="row g-4">
          <!-- Card para Nova Inspeção (existente) -->
          <div class="col-md-6 col-lg-3">
            <div
              class="card frota-action-card h-100"
              onclick="navigateTo('/checklist_veiculos')"
            >
              <div class="card-body">
                <div class="icon-circle bg-primary mx-auto mb-3">
                  <i class="fas fa-clipboard-check"></i>
                </div>
                <h3 class="card-title mb-0">Nova Inspeção</h3>
              </div>
            </div>
          </div>

          <!-- NOVO CARD: Agendar Checklist -->
          <div class="col-md-6 col-lg-3">
            <div
              class="card frota-action-card h-100"
              onclick="navigateTo('/agendar_checklist')"
            >
              <div class="card-body">
                <div class="icon-circle bg-success mx-auto mb-3">
                  <i class="fas fa-calendar-plus"></i>
                </div>
                <h3 class="card-title mb-0">Agendar Checklist</h3>
              </div>
            </div>
          </div>

          <!-- Card para Filtrar Inspeção (existente) -->
          <div class="col-md-6 col-lg-3">
            <div
              class="card frota-action-card h-100"
              onclick="navigateTo('/filtrar_veiculos')"
            >
              <div class="card-body">
                <div class="icon-circle bg-success mx-auto mb-3">
                  <i class="fas fa-filter"></i>
                </div>
                <h3 class="card-title mb-0">Filtrar Inspeção</h3>
              </div>
            </div>
          </div>

          <!-- Card para Próximas Trocas (existente) -->
          <div class="col-md-6 col-lg-3">
            <div
              class="card frota-action-card h-100"
              onclick="navigateTo('/proxima_troca_oleo')"
              data-bs-toggle="tooltip"
              data-bs-placement="top"
              title="Verifique quando cada veículo precisa da próxima troca de óleo"
            >
              <div class="card-body">
                <div class="icon-circle bg-warning mx-auto mb-3">
                  <i class="fas fa-calendar-check fa-fw me-2"></i>
                </div>
                <h3 class="card-title mb-0">Próximas Trocas</h3>
              </div>
            </div>
          </div>

          <!-- Card para Registrar Troca (existente) -->
          <div class="col-md-6 col-lg-3">
            <div
              class="card frota-action-card h-100"
              onclick="navigateTo('/registro_oleo')"
            >
              <div class="card-body">
                <div class="icon-circle bg-danger mx-auto mb-3">
                  <i class="fa-solid fa-fill-drip"></i>
                </div>
                <h3 class="card-title mb-0">Registrar Troca</h3>
              </div>
            </div>
          </div>

          <!-- Card para Controle da Frota (existente) -->
          <div class="col-md-6 col-lg-3">
            <div
              class="card frota-action-card h-100"
              onclick="navigateTo('/frota_controle')"
            >
              <div class="card-body">
                <div class="icon-circle bg-info mx-auto mb-3">
                  <i class="fas fa-project-diagram"></i>
                </div>
                <h3 class="card-title mb-0">Controle da Frota</h3>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
<div
      id="access-denied-modal"
      class="modal fade"
      tabindex="-1"
      aria-labelledby="accessDeniedModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content glass-modal">
          <div class="modal-body text-center p-4">
            <i
              class="fas fa-exclamation-circle text-danger mb-3"
              style="font-size: 3rem"
            ></i>
            <h4 class="mb-3" id="accessDeniedModalLabel">Acesso negado!</h4>
            <p>Você não tem permissão para acessar este recurso.</p>
            <button
              type="button"
              class="btn btn-primary"
              data-bs-dismiss="modal"
            >
              Entendi
            </button>
          </div>
        </div>
      </div>
    </div>
    <div
      id="development-modal"
      class="modal fade"
      tabindex="-1"
      aria-labelledby="developmentModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content glass-modal">
          <div class="modal-body text-center p-4">
            <i
              class="fas fa-hammer text-warning mb-3"
              style="font-size: 3rem"
            ></i>
            <h4 class="mb-3" id="developmentModalLabel">Em Desenvolvimento!</h4>
            <p>
              Este recurso está sendo construído e estará disponível em breve.
            </p>
            <button
              type="button"
              class="btn btn-primary"
              data-bs-dismiss="modal"
            >
              Entendi
            </button>
          </div>
        </div>
      </div>
    </div>
    <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 1056">
      <div
        id="liveToast"
        class="toast"
        role="alert"
        aria-live="assertive"
        aria-atomic="true"
      >
        <div class="toast-header">
          <strong class="me-auto">Notificação</strong>
          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="toast"
            aria-label="Close"
          ></button>
        </div>
        <div class="toast-body"></div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/shared/scripts/sidebar.js"></script>
    <script src="/scripts/frota/frota.js"></script>
  </body>
</html>
