<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Controle da Frota | Linha Viva</title>
    <meta name="theme-color" content="#0b1220" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="/static/css/gestao-frota.css" />
    <link rel="stylesheet" href="/shared/css/sidebar.css" />
  
    <script src="/shared/utils/dom-safe.js"></script>
    <script src="/shared/utils/ui-actions.js"></script>
</head>
  <body class="frota-page frota-page--controle">
    <div class="page-container">
      <div id="sidebar-root"></div>

      <main class="main-content">
        <div class="container-fluid frota-shell py-4">
          <header class="main-header page-header-frota d-flex justify-content-between align-items-start flex-wrap gap-3">
            <div>
              <div class="frota-header__badge">
                <i class="fa-solid fa-truck-front"></i>
                Frota de Veículos
              </div>
              <h1 class="page-title mb-0">
                <i class="fa-solid fa-diagram-project"></i>
                Controle da Frota
              </h1>
              <p class="page-subtitle mb-0 mt-2">
                Gerencie cadastros e inventário da frota.
              </p>
            </div>
            <div class="header-actions-stack">
              <a href="/frota" class="btn btn-secondary">
                <i class="fa-solid fa-arrow-left"></i>
                Voltar
              </a>
            </div>
          </header>

          <div class="row g-4">
            <div class="col-md-6 col-lg-4">
              <a href="/frota_veiculos_cadastro" class="text-decoration-none">
                <div class="card frota-module-card h-100">
                  <div class="card-body">
                    <div class="frota-module-icon frota-module-icon--veiculos">
                      <i class="fa-solid fa-car"></i>
                    </div>
                    <h3 class="card-title">Veículos</h3>
                    <p class="card-text">
                      Cadastre, edite e consulte os veículos da frota.
                    </p>
                  </div>
                </div>
              </a>
            </div>

            <div class="col-md-6 col-lg-4">
              <a href="/frota_motoristas_cadastro" class="text-decoration-none">
                <div class="card frota-module-card h-100">
                  <div class="card-body">
                    <div class="frota-module-icon frota-module-icon--motoristas">
                      <i class="fa-solid fa-id-card"></i>
                    </div>
                    <h3 class="card-title">Motoristas</h3>
                    <p class="card-text">
                      Gerencie motoristas, matrículas e informações.
                    </p>
                  </div>
                </div>
              </a>
            </div>

            <div class="col-md-6 col-lg-4">
              <a href="/frota_estoque_cadastro" class="text-decoration-none">
                <div class="card frota-module-card h-100">
                  <div class="card-body">
                    <div class="frota-module-icon frota-module-icon--estoque">
                      <i class="fa-solid fa-boxes-stacked"></i>
                    </div>
                    <h3 class="card-title">Estoque de Peças</h3>
                    <p class="card-text">
                      Controle o inventário de peças e suprimentos.
                    </p>
                  </div>
                </div>
              </a>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/shared/scripts/sidebar.js"></script>
  </body>
</html>
