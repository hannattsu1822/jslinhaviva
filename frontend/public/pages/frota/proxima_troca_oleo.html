<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Próxima Troca de Filtro Sky</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/css/proxima_troca_oleo.css" />
    <link rel="stylesheet" href="/shared/css/sidebar.css" />
    <link rel="stylesheet" href="/static/css/toast.css" />
  </head>

  <body>
    <div id="sidebar-root"></div>

    <div class="main-content">
      <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h2 class="page-title mb-0">
            <i class="fas fa-calendar-check me-2"></i>Próximas Trocas de Filtro
            Sky
          </h2>
          <a href="/registro_oleo" class="btn btn-primary">
            <i class="fas fa-plus me-2"></i>Registrar Nova Troca
          </a>
        </div>

        <div class="cards-container">
          <div class="loading">
            <i class="fas fa-spinner fa-spin me-2"></i>Carregando dados dos
            veículos...
          </div>
        </div>
      </div>
    </div>
<div
      id="access-denied-modal"
      class="modal fade"
      tabindex="-1"
      aria-labelledby="accessDeniedModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content glass-modal">
          <div class="modal-body text-center p-4">
            <i
              class="fas fa-exclamation-circle text-danger mb-3"
              style="font-size: 3rem"
            ></i>
            <h4 class="mb-3" id="accessDeniedModalLabel">Acesso negado!</h4>
            <p>Você não tem permissão para acessar este recurso.</p>
            <button
              type="button"
              class="btn btn-primary"
              data-bs-dismiss="modal"
            >
              Entendi
            </button>
          </div>
        </div>
      </div>
    </div>
    <div
      id="development-modal"
      class="modal fade"
      tabindex="-1"
      aria-labelledby="developmentModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content glass-modal">
          <div class="modal-body text-center p-4">
            <i
              class="fas fa-hammer text-warning mb-3"
              style="font-size: 3rem"
            ></i>
            <h4 class="mb-3" id="developmentModalLabel">Em Desenvolvimento!</h4>
            <p>
              Este recurso está sendo construído e estará disponível em breve.
            </p>
            <button
              type="button"
              class="btn btn-primary"
              data-bs-dismiss="modal"
            >
              Entendido
            </button>
          </div>
        </div>
      </div>
    </div>
    <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 1056">
      <div
        id="liveToast"
        class="toast"
        role="alert"
        aria-live="assertive"
        aria-atomic="true"
      >
        <div class="toast-header">
          <strong class="me-auto">Notificação</strong>
          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="toast"
            aria-label="Close"
          ></button>
        </div>
        <div class="toast-body"></div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/shared/scripts/sidebar.js"></script>
    <script src="/scripts/frota/proxima_troca_oleo.js"></script>
  </body>
</html>
