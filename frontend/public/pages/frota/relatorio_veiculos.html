<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Relatório de Inspeção Veicular</title>
    <link rel="stylesheet" href="/static/css/base/report-theme.css" />
    <style>
      body.lv-report-body {
        padding: 12px;
      }
      .no-print {
        text-align: center;
        margin: 20px 0 8px;
      }
      .no-print button {
        margin: 0 6px;
        padding: 10px 16px;
        border-radius: 8px;
        border: 1px solid #cbd5e1;
        background: #fff;
        cursor: pointer;
        font-weight: 600;
      }
      .no-print .pdf-btn {
        background: #163d72;
        color: #fff;
        border-color: #163d72;
      }
      @media print {
        .no-print {
          display: none !important;
        }
      }
    </style>
    <script src="/shared/utils/dom-safe.js"></script>
    <script src="/shared/utils/ui-actions.js"></script>
  </head>
  <body class="lv-report-body frota-page frota-page--relatorio">
    <div class="lv-report lv-report--landscape lv-report--technical" id="relatorioRoot">
      <div id="relatorioContent">
        <p class="lv-empty" style="text-align: center; padding: 24px">
          Carregando dados do relatório...
        </p>
      </div>
    </div>

    <div class="no-print">
      <button data-action="gerarPDF" class="pdf-btn" type="button">
        Gerar PDF
      </button>
      <button
        data-action="navigate"
        data-href="/filtrar_veiculos"
        class="back-btn"
        type="button"
      >
        Voltar para Filtrar Veículos
      </button>
    </div>

    <script src="/scripts/frota/relatorio_veiculos.js?v=2"></script>
  </body>
</html>
