<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Estoque de Peças | Linha Viva</title>
    <meta name="theme-color" content="#0b1220" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="/static/css/frota_styles.css" />
    <link rel="stylesheet" href="/shared/css/sidebar.css" />
  
    <script src="/shared/utils/dom-safe.js"></script>
    <script src="/shared/utils/ui-actions.js"></script>
</head>
  <body class="frota-page frota-page--cadastro">
    <div class="page-container">
      <div id="sidebar-root"></div>
      <main class="main-content">
        <div class="container-fluid frota-shell py-4">
          <header class="main-header page-header-frota d-flex justify-content-between align-items-start flex-wrap gap-3 mb-4">
            <div>
              <div class="frota-header__badge">
                <i class="fa-solid fa-truck-front"></i>
                Controle da Frota
              </div>
              <h1 class="page-title mb-0">
                <i class="fa-solid fa-boxes-stacked"></i>
                Estoque de Peças
              </h1>
              <p class="page-subtitle mb-0 mt-2">
                Filtre, consulte e gerencie os itens do estoque.
              </p>
            </div>
            <div class="header-actions-stack">
              <a href="/frota_controle" class="btn btn-secondary">
                <i class="fa-solid fa-arrow-left"></i>
                Voltar
              </a>
            </div>
          </header>

      <div class="form-toggle-button">
        <button class="btn btn-primary" id="toggleFormBtn">
          Cadastrar Nova Peça
        </button>
      </div>

      <div id="formContainer" class="form-container hidden">
        <section class="card-section">
          <div class="card-header">Dados da Nova Peça</div>
          <div class="card-content">
            <form id="itemEstoqueForm">
              <div class="form-grid form-grid-2-col">
                <div class="form-group">
                  <label for="cod">Código da Peça *</label>
                  <input type="text" id="cod" required maxlength="50" />
                </div>
                <div class="form-group">
                  <label for="nome">Nome/Descrição da Peça *</label>
                  <input type="text" id="nome" required maxlength="255" />
                </div>
                <div class="form-group">
                  <label for="unid">Unidade</label>
                  <input
                    type="text"
                    id="unid"
                    maxlength="10"
                    placeholder="Ex: Un, Pç, Mt, Kg"
                  />
                </div>
              </div>
              <div class="form-actions">
                <button type="submit" class="btn btn-success">
                  Salvar Peça
                </button>
                <button
                  type="button"
                  id="closeFormBtn"
                  class="btn btn-secondary"
                >
                  Fechar
                </button>
              </div>
            </form>
          </div>
        </section>
      </div>

      <section class="card-section">
        <div class="card-header">Filtros de Pesquisa</div>
        <div class="card-content">
          <form class="form-grid form-grid-3-col">
            <div class="form-group">
              <label for="filterId">ID</label>
              <input
                type="text"
                id="filterId"
                placeholder="Filtrar por ID..."
              />
            </div>
            <div class="form-group">
              <label for="filterCod">Código da Peça</label>
              <input
                type="text"
                id="filterCod"
                placeholder="Filtrar por Código..."
              />
            </div>
            <div class="form-group">
              <label for="filterNome">Nome/Descrição</label>
              <input
                type="text"
                id="filterNome"
                placeholder="Filtrar por Nome..."
              />
            </div>
          </form>
        </div>
      </section>

      <section class="card-section">
        <div class="card-header">Peças Cadastradas no Estoque</div>
        <div class="card-content">
          <div class="table-wrapper">
            <table class="data-table">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Código</th>
                  <th>Nome/Descrição</th>
                  <th>Unidade</th>
                  <th>Ações</th>
                </tr>
              </thead>
              <tbody id="itensEstoqueTableBody"></tbody>
            </table>
          </div>
        </div>
      </section>
        </div>
      </main>
    </div>

    <div id="toastContainer" class="toast-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/scripts/frota/frota_estoque_cadastro.js"></script>
    <script src="/shared/scripts/sidebar.js"></script>
  </body>
</html>
