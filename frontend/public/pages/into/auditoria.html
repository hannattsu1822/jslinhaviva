<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auditoria | Linha Viva</title>
    <meta name="theme-color" content="#0b1220" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="/static/css/auditoria.css" />
    <link rel="stylesheet" href="/shared/css/sidebar.css" />
  </head>
  <body class="auditoria-page">
    <div id="sidebar-root"></div>

    <div class="main-content">
      <div class="container-fluid py-4">
        <header class="auditoria-header">
          <div class="auditoria-header__badge">
            <i class="fas fa-shield-halved"></i>
            Segurança e rastreabilidade
          </div>
          <h1 class="auditoria-header__title">Logs de Auditoria</h1>
          <p class="auditoria-header__subtitle">
            Histórico de ações registradas no sistema para controle e conformidade.
          </p>
        </header>

        <section class="auditoria-panel" aria-label="Registros de auditoria">
          <div
            id="loadingMessage"
            class="auditoria-alert auditoria-alert--info"
            role="status"
          >
            <i class="fas fa-spinner fa-spin me-2"></i>Carregando logs de auditoria...
          </div>

          <div
            id="errorMessage"
            class="auditoria-alert auditoria-alert--error"
            role="alert"
          ></div>

          <div
            id="noLogsMessage"
            class="auditoria-alert auditoria-alert--warning"
            role="status"
          >
            <i class="fas fa-info-circle me-2"></i>Nenhum log de auditoria encontrado.
          </div>

          <div class="auditoria-table-wrap" id="tableWrapper" style="display: none">
            <table class="table mb-0" id="auditoriaTable">
              <thead>
                <tr>
                  <th scope="col">ID</th>
                  <th scope="col">Matrícula</th>
                  <th scope="col">Ação</th>
                  <th scope="col">Detalhes</th>
                  <th scope="col">Data/Hora</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </section>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/shared/scripts/sidebar.js"></script>
    <script>
      const CARGOS_PERMITIDOS = [
        "Técnico",
        "Engenheiro",
        "ADMIN",
        "ADM",
        "Encarregado",
        "Inspetor",
      ];

      function showAlert(element, visible) {
        if (!element) return;
        element.classList.toggle("auditoria-alert--visible", visible);
        element.style.display = visible ? "block" : "none";
      }

      document.addEventListener("DOMContentLoaded", function () {
        const user = JSON.parse(localStorage.getItem("user"));
        const errorDiv = document.getElementById("errorMessage");
        const tableWrapper = document.getElementById("tableWrapper");

        if (!user || !CARGOS_PERMITIDOS.includes(user.cargo)) {
          errorDiv.textContent =
            "Acesso negado. Seu cargo não tem permissão para visualizar esta página.";
          showAlert(errorDiv, true);
          showAlert(document.getElementById("loadingMessage"), false);
          showAlert(document.getElementById("noLogsMessage"), false);
          if (tableWrapper) tableWrapper.style.display = "none";
          return;
        }

        carregarAuditoria();
      });

      async function carregarAuditoria() {
        const tbody = document.querySelector("#auditoriaTable tbody");
        const loadingMessage = document.getElementById("loadingMessage");
        const errorMessage = document.getElementById("errorMessage");
        const noLogsMessage = document.getElementById("noLogsMessage");
        const tableWrapper = document.getElementById("tableWrapper");

        tbody.innerHTML = "";
        showAlert(loadingMessage, true);
        showAlert(errorMessage, false);
        showAlert(noLogsMessage, false);
        if (tableWrapper) tableWrapper.style.display = "none";

        try {
          const response = await fetch("/api/auditoria");

          if (!response.ok) {
            let errorMsg = "Erro ao carregar auditoria.";
            if (response.status === 401 || response.status === 403) {
              errorMsg =
                "Você não está autenticado ou não tem permissão para ver estes dados.";
            } else {
              const errorData = await response.json().catch(() => null);
              if (errorData && errorData.message) {
                errorMsg = errorData.message;
              }
            }
            throw new Error(errorMsg);
          }

          const logs = await response.json();
          showAlert(loadingMessage, false);

          if (logs.length === 0) {
            showAlert(noLogsMessage, true);
            return;
          }

          if (tableWrapper) tableWrapper.style.display = "block";

          logs.forEach((log) => {
            const row = document.createElement("tr");
            row.innerHTML = `
              <td data-label="ID">${log.id}</td>
              <td data-label="Matrícula">${log.matricula_usuario}</td>
              <td data-label="Ação">${log.acao}</td>
              <td data-label="Detalhes">${log.detalhes || ""}</td>
              <td data-label="Data/Hora">${log.timestamp_formatado}</td>
            `;
            tbody.appendChild(row);
          });
        } catch (err) {
          console.error("Erro ao carregar auditoria:", err);
          showAlert(loadingMessage, false);
          errorMessage.textContent =
            err.message || "Erro desconhecido ao carregar auditoria.";
          showAlert(errorMessage, true);
          if (tableWrapper) tableWrapper.style.display = "none";
        }
      }
    </script>
  </body>
</html>
