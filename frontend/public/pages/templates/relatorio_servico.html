<!-- Layout otimizado para A4 paisagem -->
<section class="lv-section">
  <h2 class="lv-section__title">Detalhes do Serviço</h2>
  <div class="lv-section__body">
    <div class="lv-info-grid lv-info-grid--4col">
      {{detalhes_servico_grid}}
    </div>
  </div>
</section>

<div class="lv-landscape-split">
  <section class="lv-section">
    <h2 class="lv-section__title">Equipe Responsável</h2>
    <div class="lv-section__body">{{lista_responsaveis}}</div>
  </section>

  <section class="lv-section">
    <h2 class="lv-section__title">Detalhes da Finalização</h2>
    <div class="lv-section__body">
      <div class="lv-info-grid lv-info-grid--1col">
        {{detalhes_finalizacao_grid}}
      </div>
    </div>
  </section>
</div>

<section class="lv-section lv-page-break">
  <h2 class="lv-section__title">Anexos Fotográficos</h2>
  <div class="lv-section__body">{{galeria_geral}}</div>
</section>

<section class="lv-section">
  <h2 class="lv-section__title">Documentos Anexos (PDF)</h2>
  <div class="lv-section__body">{{lista_anexos_pdf}}</div>
</section>
